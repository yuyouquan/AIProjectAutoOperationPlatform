<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 项目自治演示舱 Demo</title>
    <link rel="icon" href="data:,">
    <link id="demo-style" rel="stylesheet">
    <script>
      (function () {
        function demoAssetBase() {
          if (window.location.protocol === "file:") return "./";
          if (window.location.pathname === "/demo" || window.location.pathname === "/demo/") return "/demo/";
          return "./";
        }

        var assetBase = demoAssetBase();
        var styleLink = document.getElementById("demo-style");
        if (styleLink) styleLink.href = assetBase + "styles.css";

        window.__DEMO_ASSET_BASE__ = assetBase;
        window.__loadDemoScript__ = function loadDemoScript(fileName) {
          return new Promise(function (resolve, reject) {
            var script = document.createElement("script");
            script.src = assetBase + fileName;
            script.onload = resolve;
            script.onerror = function () { reject(new Error("Demo script load failed: " + fileName)); };
            document.body.appendChild(script);
          });
        };
      })();
    </script>
  </head>
  <body>
    <main class="demo-shell" id="demo-root">
      <section class="hero-panel" aria-label="AI 项目自治演示舱">
        <div class="hero-copy">
          <p class="eyebrow">AI 黑客松 Demo V1.0</p>
          <div class="hero-title-row">
            <h1>AI 项目自治演示舱</h1>
            <div class="analysis-workbench" id="analysis-workbench" aria-label="新建分析入库与分析历史"></div>
          </div>
          <p>一次点击，看清 AI 如何把多文档入库、风险解析、任务生成和问题跟进表串成可追踪闭环。</p>
        </div>
        <div class="hero-metrics" id="hero-metrics"></div>
      </section>

      <section class="flow-rail" id="flow-rail" aria-label="AI 自动演示流程"></section>

      <section class="demo-grid">
        <aside class="glass-card signal-panel">
          <div class="section-head">
            <span>01</span>
            <div>
              <p class="eyebrow">方案输入</p>
              <h2>只看关键数据</h2>
            </div>
          </div>
          <div class="scenario-card" id="scenario-card"></div>
          <div class="signal-strip" id="signal-strip"></div>
        </aside>

        <section class="glass-card ai-stage" id="ai-stage">
          <div class="stage-orb" aria-hidden="true">
            <span></span>
          </div>
          <div class="stage-copy">
            <p class="eyebrow" id="stage-kicker">等待启动</p>
            <h2 id="stage-title">AI 尚未开始分析</h2>
            <p id="stage-detail">点击下方按钮后，Demo 会自动跑完数据解析、AI 思考、任务生成和问题输出。</p>
          </div>
          <div class="evidence-line" id="evidence-line">当前没有动作。唯一操作按钮会驱动整条演示流程。</div>
          <div class="lark-notification-feed" id="lark-notification-feed" aria-live="polite"></div>
          <button class="primary-action" id="primary-action" type="button">开始 AI 自动演示</button>
        </section>
      </section>

      <section class="glass-card result-card" id="result-card">
        <div class="section-head">
          <span>04</span>
          <div>
            <p class="eyebrow">问题输出</p>
            <h2>等待生成列表</h2>
          </div>
        </div>
        <div id="result-content"></div>
      </section>
    </main>

    <div id="analysis-modal-root"></div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      (function () {
        function bootDemo() {
          window.__loadDemoScript__("data.js")
            .then(function () { return window.__loadDemoScript__("app.js"); })
            .catch(function (error) {
              var toast = document.getElementById("toast");
              if (toast) {
                toast.textContent = "Demo 资源加载失败，请检查 data.js / app.js 路径。";
                toast.classList.add("show");
              }
              console.error(error);
            });
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", bootDemo);
        } else {
          bootDemo();
        }
      })();
    </script>
  </body>
</html>
